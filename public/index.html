<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>静态页面入口</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172033;
      background: #f6f7f9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 48px 20px;
    }

    main {
      width: min(920px, 100%);
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 700;
    }

    p {
      margin: 0 0 28px;
      color: #5d667a;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    a {
      display: block;
      min-height: 88px;
      padding: 18px;
      border: 1px solid #dfe3ea;
      border-radius: 8px;
      color: inherit;
      background: #fff;
      text-decoration: none;
      box-shadow: 0 1px 2px rgba(18, 28, 45, 0.04);
    }

    a:hover {
      border-color: #8ba4d6;
      box-shadow: 0 8px 22px rgba(18, 28, 45, 0.08);
      transform: translateY(-1px);
    }

    strong {
      display: block;
      margin-bottom: 6px;
      font-size: 16px;
    }

    span {
      display: block;
      color: #687287;
      font-size: 13px;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main>
    <h1>静态页面入口</h1>
    <p>选择要查看的页面。</p>
    <div class="grid">
      <a href="./withdrawal-account-list-static.html">
        <strong>提现账号列表</strong>
        <span>withdrawal-account-list-static.html</span>
      </a>
      <a href="./payment-check-admin-static.html">
        <strong>PaymentCheck 静态后台</strong>
        <span>payment-check-admin-static.html</span>
      </a>
      <a href="./payment-check-reconciliation.html">
        <strong>代付三方对账</strong>
        <span>payment-check-reconciliation.html</span>
      </a>
      <a href="./permission-node-search-prototype.html">
        <strong>功能权限节点优化原型</strong>
        <span>permission-node-search-prototype.html</span>
      </a>
      <a href="./card-click-statistics-prototype.html">
        <strong>查单卡片点击统计</strong>
        <span>card-click-statistics-prototype.html</span>
      </a>
      <a href="./news-cs-config.html">
        <strong>代理等级管理</strong>
        <span>news-cs-config.html</span>
      </a>
    </div>
  </main>
</body>
</html>
